<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrieflyX - Futuristic News UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="dark">
    <header class="navbar glass">
      <div class="nav-inner container">
        <a class="logo" href="#">BrieflyX</a>
        <button class="menu-btn" id="menuBtn" aria-label="Open menu">&#9776;</button>
        <nav class="nav-links" id="navLinks">
          <a href="#home">Home</a>
          <a href="#categories">Categories</a>
          <a href="#profile">Profile</a>
        </nav>
        <div class="nav-actions">
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </button>
          <button class="ghost-btn" id="authBtn">Login</button>
        </div>
      </div>
    </header>
    <p class="auth-status container" id="authStatus" aria-live="polite"></p>

    <main class="container page">
      <section id="home" class="panel">
        <div class="section-head">
          <h1>Future Headlines, Briefly</h1>
          <p>Curated stories in a clean, modern reading experience.</p>
        </div>
        <div class="categories-row" id="categories"></div>
        <div class="news-grid" id="newsGrid"></div>
      </section>

      <section id="article" class="panel article-panel">
        <article class="article-card glass">
          <span class="meta-chip" id="articleCategory">Technology</span>
          <h2 id="articleTitle">Neural Interface Chips Reach Consumer Trials</h2>
          <p class="article-meta" id="articleMeta">May 1, 2026</p>
          <div class="article-content" id="articleContent"></div>
          <div class="lock-overlay" id="lockOverlay">
            <p>Login to read full article</p>
            <button class="primary-btn" id="loginCta">Login / Sign Up</button>
          </div>
        </article>
      </section>

      <section id="profile" class="panel">
        <div class="section-head">
          <h2>Profile & Preferences</h2>
          <p>Pick your favorite categories for a personalized feed.</p>
        </div>
        <div class="pref-panel glass">
          <div class="chip-grid" id="prefGrid"></div>
        </div>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
